version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-brain-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/.amkyaw:/app/.amkyaw:ro
    restart: unless-stopped
    networks:
      - ai-brain-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-brain-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-brain-network

networks:
  ai-brain-network:
    driver: bridge
